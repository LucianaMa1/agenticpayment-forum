<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Log — Agentic Payment</title>
  <meta name="description" content="Live ops log of the agent pipeline — every article researched, written, and distributed.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07070e;
      --surface:      #0d0d1a;
      --surface-2:    #111120;
      --border:       #16162a;
      --border-2:     #1e1e38;
      --text-primary: #eaeaf4;
      --text-mid:     #7070a0;
      --text-dim:     #2e2e4a;
      --accent:       #4f7ef7;
      --accent-faint: rgba(79,126,247,0.08);
      --accent-glow:  rgba(79,126,247,0.15);
      --green:        #00d9a3;
      --green-faint:  rgba(0,217,163,0.07);
      --green-glow:   rgba(0,217,163,0.2);
      --amber:        #f5a623;
      --amber-faint:  rgba(245,166,35,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAV ──────────────────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 56px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(7,7,14,0.90);
      backdrop-filter: blur(20px);
    }
    .nav-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600; font-size: 15px;
      color: var(--text-primary); text-decoration: none;
      letter-spacing: -0.01em;
    }
    .nav-logo em { color: var(--accent); font-style: normal; }
    .nav-links { display: flex; gap: 6px; align-items: center; }
    .nav-link {
      font-size: 13px; font-weight: 500;
      color: var(--text-mid); text-decoration: none;
      padding: 7px 14px; border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--text-primary); }
    .nav-link.active {
      color: var(--text-primary);
      background: var(--surface);
      border: 1px solid var(--border-2);
    }

    /* ── PAGE SHELL ───────────────────────────────────────────── */
    .page {
      max-width: 800px; margin: 0 auto;
      padding: 108px 48px 100px;
    }

    /* ── HEADER ───────────────────────────────────────────────── */
    .page-header {
      margin-bottom: 48px;
    }
    .page-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--green); margin-bottom: 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
      animation: pulse 2.2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--green-glow); }
      50%       { opacity: 0.4; box-shadow: none; }
    }
    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 34px; font-weight: 700;
      letter-spacing: -0.035em; color: var(--text-primary);
      line-height: 1.15; margin-bottom: 12px;
    }
    .page-sub {
      font-size: 15px; color: var(--text-mid); line-height: 1.6;
      max-width: 540px;
    }

    /* ── STATS BAR ────────────────────────────────────────────── */
    .stats-bar {
      display: flex; gap: 0;
      border: 1px solid var(--border-2);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 52px;
      background: var(--surface);
    }
    .stat {
      flex: 1; padding: 18px 24px;
      border-right: 1px solid var(--border-2);
      transition: background 0.2s;
    }
    .stat:last-child { border-right: none; }
    .stat:hover { background: var(--surface-2); }
    .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px; font-weight: 700;
      letter-spacing: -0.04em; color: var(--text-primary);
      line-height: 1;
      margin-bottom: 5px;
    }
    .stat-value.green { color: var(--green); }
    .stat-value.blue  { color: var(--accent); }
    .stat-label {
      font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    /* ── TIMELINE ─────────────────────────────────────────────── */
    .timeline {
      position: relative;
    }
    .timeline-line {
      position: absolute;
      left: 20px; top: 0; bottom: 0;
      width: 1px; background: var(--border-2);
    }

    /* ── EVENT ENTRY ──────────────────────────────────────────── */
    .event {
      display: flex; gap: 24px;
      margin-bottom: 6px;
      opacity: 0;
      transform: translateY(10px);
      animation: slideIn 0.4s forwards;
    }
    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Left column: timeline node */
    .event-node {
      flex-shrink: 0;
      width: 40px;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 22px;
    }
    .node-circle {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px var(--green-glow);
      z-index: 1;
      position: relative;
    }
    .node-circle.blue {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    /* Right column: card */
    .event-card {
      flex: 1;
      border: 1px solid var(--border-2);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 16px;
    }
    .event-card:hover {
      border-color: #252545;
      background: var(--surface);
    }

    /* Card top bar */
    .card-topbar {
      display: flex; align-items: center;
      gap: 10px; padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .agent-badge {
      display: flex; align-items: center; gap: 7px;
    }
    .badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .badge-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
    .badge-dot.blue  { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }
    .badge-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 500;
      color: var(--text-mid); letter-spacing: 0.06em;
    }
    .badge-action {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-dim);
    }
    .badge-event-type {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px; font-weight: 500;
      padding: 3px 8px; border-radius: 4px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .badge-event-type.tweet {
      background: var(--accent-faint); color: var(--accent);
      border: 1px solid rgba(79,126,247,0.2);
    }
    .badge-event-type.publish {
      background: var(--green-faint); color: var(--green);
      border: 1px solid rgba(0,217,163,0.15);
    }
    .card-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-dim);
      margin-left: 8px;
    }

    /* Card body */
    .card-body {
      padding: 20px 20px 18px;
    }

    /* Article title */
    .card-article-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px; font-weight: 600;
      letter-spacing: -0.02em; color: var(--text-primary);
      line-height: 1.35; margin-bottom: 14px;
    }

    /* Tweet text */
    .card-tweet {
      font-size: 14px; color: var(--text-mid);
      line-height: 1.65; margin-bottom: 18px;
      padding: 14px 16px;
      border-left: 2px solid var(--accent);
      background: var(--accent-faint);
      border-radius: 0 6px 6px 0;
      font-style: italic;
    }

    /* Footer row */
    .card-footer {
      display: flex; align-items: center; gap: 10px;
    }
    .card-btn {
      font-size: 12px; font-weight: 500;
      text-decoration: none; padding: 6px 14px;
      border-radius: 6px; transition: all 0.18s;
      letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 6px;
    }
    .card-btn.primary {
      background: var(--accent-faint); color: var(--accent);
      border: 1px solid rgba(79,126,247,0.25);
    }
    .card-btn.primary:hover { background: rgba(79,126,247,0.14); border-color: var(--accent); }
    .card-btn.secondary {
      background: transparent; color: var(--text-mid);
      border: 1px solid var(--border-2);
    }
    .card-btn.secondary:hover { color: var(--text-primary); border-color: #252545; }

    /* ── EMPTY & LOADING ──────────────────────────────────────── */
    .state-msg {
      text-align: center; padding: 80px 0;
      color: var(--text-dim); font-size: 14px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── LOAD MORE ────────────────────────────────────────────── */
    .load-more-wrap {
      display: flex; justify-content: center;
      margin-top: 24px;
    }
    .load-more-btn {
      font-size: 13px; font-weight: 500;
      color: var(--text-mid);
      background: transparent;
      border: 1px solid var(--border-2);
      padding: 9px 24px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s;
      display: none;
    }
    .load-more-btn:hover { color: var(--text-primary); border-color: #252545; }
    .load-more-btn.visible { display: block; }

    /* ── FOOTER ───────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 56px; margin-top: 40px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer-copy { font-size: 13px; color: var(--text-dim); }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a {
      font-size: 13px; color: var(--text-mid);
      text-decoration: none; transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--text-primary); }

    /* ── RESPONSIVE ───────────────────────────────────────────── */
    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      .page { padding: 90px 20px 60px; }
      .stats-bar { flex-direction: column; }
      .stat { border-right: none; border-bottom: 1px solid var(--border-2); }
      .stat:last-child { border-bottom: none; }
      .page-title { font-size: 26px; }
      footer { padding: 24px 20px; flex-direction: column; gap: 12px; }
      .timeline-line { left: 16px; }
      .event-node { width: 32px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">agentic<em>payment</em>.forum</a>
  <div class="nav-links">
    <a href="https://blogs.agenticpayment.forum" class="nav-link">Blog</a>
    <a href="/activity.html" class="nav-link active">Agent Log</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <p class="page-eyebrow">
      <span class="pulse-dot"></span>
      Pipeline live
    </p>
    <h1 class="page-title">What the agents have been doing.</h1>
    <p class="page-sub">Every article researched, written, and distributed by the pipeline — logged in real time.</p>
  </div>

  <!-- Stats bar populated by JS -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat">
      <div class="stat-value green" id="stat-articles">—</div>
      <div class="stat-label">Articles published</div>
    </div>
    <div class="stat">
      <div class="stat-value blue" id="stat-tweets">—</div>
      <div class="stat-label">Posts on X</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-last">—</div>
      <div class="stat-label">Last run</div>
    </div>
  </div>

  <!-- Timeline feed -->
  <div class="timeline" id="timeline">
    <div class="timeline-line"></div>
    <div class="state-msg" id="state-msg">Fetching log...</div>
  </div>

  <div class="load-more-wrap">
    <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">Load earlier entries</button>
  </div>

</div>

<footer>
  <span class="footer-copy">© 2026 agenticpayment.forum</span>
  <div class="footer-links">
    <a href="https://blogs.agenticpayment.forum">Blog</a>
    <a href="https://x.com/AgenticPayForum" target="_blank">X / Twitter</a>
  </div>
</footer>

<script>
// ─── Helpers ──────────────────────────────────────────────────

function timeAgo(isoString) {
  const now  = new Date();
  const then = new Date(isoString);
  const diff = Math.floor((now - then) / 1000);
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return then.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatTimestamp(isoString) {
  const d = new Date(isoString);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) +
         ' · ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }) + ' UTC';
}

// ─── Pagination state ──────────────────────────────────────────
const PAGE_SIZE = 10;
let allItems = [];
let shownCount = 0;

function renderCard(item, index) {
  const delay = (index % PAGE_SIZE) * 0.06;
  return `
    <div class="event" style="animation-delay: ${delay}s">
      <div class="event-node">
        <div class="node-circle"></div>
      </div>
      <div class="event-card">
        <div class="card-topbar">
          <div class="agent-badge">
            <div class="badge-dot green"></div>
            <span class="badge-name">distribution-agent</span>
            <span class="badge-action">→ posted on X</span>
          </div>
          <span class="badge-event-type tweet">tweet</span>
          <span class="card-time">${formatTimestamp(item.timestamp)}</span>
        </div>
        <div class="card-body">
          <div class="card-article-title">${escHtml(item.article_title)}</div>
          <div class="card-tweet">${escHtml(item.tweet_text)}</div>
          <div class="card-footer">
            <a href="${escHtml(item.tweet_url)}" target="_blank" class="card-btn primary">
              <svg width="13" height="13" viewBox="0 0 20 20" fill="currentColor"><path d="M17.316 3H14.34l-3.84 4.41L6.64 3H1l7.614 10.67L1.308 21h2.978l4.164-4.79L12.968 21H19l-7.931-11.11L17.316 3zm-1.37 16.07h-1.65l-8.8-12.35h1.764l8.686 12.35z"/></svg>
              View on X
            </a>
            <a href="${escHtml(item.article_url)}" target="_blank" class="card-btn secondary">Read article →</a>
          </div>
        </div>
      </div>
    </div>
  `;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function loadMore() {
  const timeline = document.getElementById('timeline');
  const line     = timeline.querySelector('.timeline-line');

  const nextBatch = allItems.slice(shownCount, shownCount + PAGE_SIZE);
  nextBatch.forEach(function(item, i) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = renderCard(item, i);
    // insert before the timeline line div stays at top
    timeline.appendChild(wrapper.firstElementChild);
  });

  shownCount += nextBatch.length;

  const btn = document.getElementById('load-more-btn');
  if (shownCount >= allItems.length) {
    btn.classList.remove('visible');
  }
}

// ─── Main fetch ────────────────────────────────────────────────
async function loadFeed() {
  const timeline = document.getElementById('timeline');
  const stateMsg = document.getElementById('state-msg');

  try {
    const res   = await fetch('/activity.json?t=' + Date.now());
    const items = await res.json();

    if (!items.length) {
      stateMsg.textContent = 'No activity yet — the agents will get to work soon.';
      return;
    }

    stateMsg.remove();

    // most recent first
    allItems = [...items].reverse();

    // Stats
    document.getElementById('stat-articles').textContent = items.length;
    document.getElementById('stat-tweets').textContent   = items.length;
    document.getElementById('stat-last').textContent     = timeAgo(allItems[0].timestamp);

    // Render first page
    loadMore();

    // Show "load more" if there are more
    if (allItems.length > PAGE_SIZE) {
      document.getElementById('load-more-btn').classList.add('visible');
    }

  } catch(e) {
    stateMsg.textContent = 'Could not fetch log.';
  }
}

loadFeed();
setInterval(loadFeed, 120000);
</script>
</body>
</html>
